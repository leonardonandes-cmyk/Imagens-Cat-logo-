<style>
  :root{--bg:#fefdfb;--ink:#1c1a17;--soft:#6f685e;--line:#e7e1d6;--champagne:#c9a86a;--studio:#e9e3d9;--card:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;line-height:1.5}

  header{position:sticky;top:0;z-index:50;background:rgba(254,253,251,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar{max-width:1180px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .wordmark{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:25px;letter-spacing:.42em;padding-left:.42em;color:var(--ink);white-space:nowrap;text-decoration:none}
  nav{display:flex;gap:24px;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav a{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);text-decoration:none;position:relative;padding:4px 0;white-space:nowrap;transition:color .3s}
  nav a::after{content:"";position:absolute;left:0;bottom:0;height:1px;width:0;background:var(--champagne);transition:width .35s}
  nav a:hover{color:var(--ink)} nav a:hover::after{width:100%}

  .hero{position:relative;height:82vh;max-height:760px;min-height:480px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .hero-pic{position:absolute;inset:0}
  .hero-pic img{width:100%;height:100%;object-fit:cover;object-position:center 16%;animation:kb 22s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1)}to{transform:scale(1.08)}}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(28,26,23,.14),rgba(28,26,23,.4))}
  .hero-inner{position:relative;z-index:2;text-align:center;color:#fff;padding:0 24px}
  .hero-eyebrow{font-size:11px;letter-spacing:.36em;text-transform:uppercase;margin-bottom:22px;opacity:0;animation:rise .9s .1s forwards}
  .hero h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(44px,9vw,86px);letter-spacing:.46em;padding-left:.46em;line-height:1;opacity:0;animation:rise .9s .25s forwards}
  .hero-sub{margin-top:20px;font-size:12px;letter-spacing:.24em;text-transform:uppercase;opacity:0;animation:rise .9s .4s forwards}
  .hero-cta{display:inline-block;margin-top:32px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.6);padding:13px 30px;transition:background .35s,color .35s;opacity:0;animation:rise .9s .55s forwards}
  .hero-cta:hover{background:#fff;color:var(--ink)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .collection{max-width:1180px;margin:0 auto;padding:56px 24px 8px}
  .col-head{margin-bottom:30px;max-width:560px}
  .col-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--champagne);margin-bottom:10px}
  .col-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;letter-spacing:.03em}
  .col-desc{margin-top:12px;color:var(--ink);font-size:14px;line-height:1.6;font-weight:600}
  .rule{height:1px;background:var(--line);position:relative;margin-top:20px;overflow:hidden}
  .rule::after{content:"";position:absolute;left:0;top:0;height:100%;width:0;background:var(--champagne);transition:width 1.1s cubic-bezier(.16,.8,.3,1)}
  .rule.in::after{width:120px}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding-bottom:44px}
  @media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr);gap:26px}}
  @media(min-width:1040px){.grid{grid-template-columns:repeat(4,1fr);gap:28px}}

  .card{background:var(--card);opacity:0;transform:translateY(18px);transition:opacity .7s,transform .7s;display:block}
  .card.in{opacity:1;transform:none}
  .frame{position:relative;overflow:hidden;background:var(--studio);aspect-ratio:4/5;display:block;text-decoration:none}
  .frame img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1.4s cubic-bezier(.16,.8,.3,1),opacity .25s}
  .card:hover .frame img{transform:scale(1.06)}
  .tag{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--champagne);background:rgba(254,253,251,.92);padding:5px 10px;z-index:3}
  .dl{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(254,253,251,.9);color:var(--ink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.9;transition:opacity .3s,background .3s,transform .2s;z-index:4;user-select:none}
  .dl:hover{opacity:1;background:#fff;transform:translateY(-1px)}
  .buy{position:absolute;left:0;right:0;bottom:0;background:rgba(28,26,23,.9);color:#fff;text-align:center;padding:12px;font-size:11px;letter-spacing:.26em;text-transform:uppercase;transform:translateY(100%);transition:transform .4s;z-index:3}
  .card:hover .buy{transform:translateY(0)}
  .meta{padding:16px 4px 8px;text-align:center}
  .name{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink)}
  .price{margin-top:7px;font-size:14px;color:var(--soft)}
  .swatches{display:flex;gap:7px;justify-content:center;margin-top:11px;flex-wrap:wrap}
  .dot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.14);cursor:pointer;transition:transform .2s,box-shadow .2s}
  .dot:hover{transform:scale(1.15)}
  .dot.on{box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--champagne)}
  .cor-nome{margin-top:8px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);min-height:14px}

  .vazio{padding:26px 4px 48px;color:var(--soft);font-size:13px;letter-spacing:.14em;text-transform:uppercase}
  .ofertas{background:#f6f1e8;max-width:none;padding-left:0;padding-right:0}
  .ofertas .col-eyebrow{color:#b8955a}
  .ofertas-in{max-width:1180px;margin:0 auto;padding:0 24px}
  .tag-oferta{color:#b8955a!important}

  .reseller{max-width:1180px;margin:26px auto 0;padding:0 24px}
  .reseller-inner{background:var(--ink);color:#fff;text-align:center;padding:56px 24px}
  .reseller-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--champagne);margin-bottom:16px}
  .reseller h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(26px,4vw,38px);line-height:1.2}
  .reseller a{display:inline-block;margin-top:28px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.5);padding:13px 30px;transition:background .35s,border-color .35s}
  .reseller a:hover{background:#25d366;border-color:#25d366}

  footer{border-top:1px solid var(--line);margin-top:44px;padding:48px 24px 56px;text-align:center}
  .foot-mark{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.4em;padding-left:.4em;margin-bottom:16px}
  .foot-line{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft)}
  .ig{display:inline-block;margin-top:22px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);text-decoration:none;border:1px solid var(--line);padding:11px 22px;transition:border-color .3s,color .3s}
  .ig:hover{border-color:var(--champagne);color:var(--champagne)}

  .status{max-width:1180px;margin:0 auto;padding:48px 24px;text-align:center;color:var(--soft);font-size:13px;letter-spacing:.1em}
  @media(max-width:640px){
    .bar{flex-direction:column;gap:14px}
    nav{gap:18px;width:100%}
    nav a{font-size:11px;letter-spacing:.1em}
    .collection{padding-top:44px}
    .hero{height:88vh;min-height:540px;max-height:none}
    .hero-pic img{object-position:center 28%}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .card{opacity:1;transform:none}.rule::after{width:120px}
    .hero-eyebrow,.hero h1,.hero-sub,.hero-cta{opacity:1}
  }
</style>
</head>

<script>
/* ============================================================
   CONFIGURAÇÃO — os únicos valores que talvez você precise mexer
   ============================================================ */
const PLANILHA_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdb6qFDgmJRe_Rgqcm4K9a6OmXZ97sajYApbnYJyMWbrB3IjnkHkLtE1GLedOQkEFoaOuTqWfKNEgH/pub?gid=1734594426&single=true&output=csv";
const WHATSAPP     = "5537984166608";
const INSTAGRAM    = "https://instagram.com/calcadosdbaesse";
const REPO_FOTOS   = "https://raw.githubusercontent.com/leonardonandes-cmyk/Imagens-Cat-logo-/main/";
const REPO_SITE    = "https://raw.githubusercontent.com/leonardonandes-cmyk/DBAESSE-catalogo/main/";
const EXTENSAO     = ".jpeg";

/* Ordem das categorias no site + a frase de cada uma */
const CATEGORIAS = [
  ["Papete",      "O conforto que virou desejo — tiras marcantes pra usar do dia à noite."],
  ["Salto Bloco", "Altura com firmeza — o salto que sustenta o dia inteiro sem abrir mão da elegância."],
  ["Rasteira",    "Leveza pra todo dia — a base do verão, do trabalho ao fim de semana."],
  ["Sapatilha",   "Clássica e atual — o toque delicado que combina com tudo."],
  ["Mocassim",    "Sofisticação sem esforço — a peça que eleva qualquer look."]
];

/* Cor escrita na planilha -> bolinha no site */
const CORES = {
  "preto":"#2b2b2b","caramelo":"#b98b6a","chocolate":"#5b3d2b","palha":"#e0cfae",
  "nude":"#d9b9a3","off-white":"#efe9dd","offwhite":"#efe9dd","branco":"#f7f5f0",
  "bege":"#ddcdb6","marrom":"#7a5c46","cafe":"#4b3629","vinho":"#6d2635",
  "verde":"#4a5d47","verde-oliva":"#6b6b3f","azul":"#3a4a5e","dourado":"#c9a86a",
  "prata":"#c8c8c8","cinza":"#9a9a9a","rosa":"#d9a7a7","vermelho":"#8f2f2f",
  "amarelo":"#d8b95c","laranja":"#c97a3c","onca":"#a67c52","animal-print":"#a67c52"
};

/* ============================================================ */

const $ = s => document.querySelector(s);
const slug = s => (s||"").toString().trim().toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"-");
const cap = s => (s||"").toString().trim().replace(/\s+/g," ");

function parseCSV(text){
  const rows=[]; let row=[], val="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){val+='"';i++;} else q=false; }
      else val+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(val); val=""; }
      else if(c==='\n'){ row.push(val); rows.push(row); row=[]; val=""; }
      else if(c!=='\r') val+=c;
    }
  }
  row.push(val); rows.push(row);
  return rows.filter(r=>r.some(v=>(v||"").trim()!==""));
}

function corHex(nome){
  const k=slug(nome);
  if(CORES[k]) return CORES[k];
  for(const key in CORES) if(k.includes(key)) return CORES[key];
  return "#c4bcae";
}

const REPOS=[REPO_FOTOS,REPO_SITE];
const EXTS=[".jpeg",".jpg",".JPEG",".JPG",".png",".webp"];
function fotoUrls(row, idx){
  const ref=(row[idx.ref]||"").trim();
  if(!ref) return [];
  const enc=encodeURI(ref);
  const out=[];
  REPOS.forEach(r=>EXTS.forEach(e=>out.push(r+enc+e)));
  return out;
}
function proximaFoto(img){
  try{
    const lista=JSON.parse(decodeURIComponent(img.dataset.lista||"[]"));
    let i=parseInt(img.dataset.i||"0",10)+1;
    if(i<lista.length){ img.dataset.i=String(i); img.src=lista[i]; }
    else { img.onerror=null; img.removeAttribute("alt"); img.style.opacity=".25"; }
  }catch(e){ img.onerror=null; }
}
function trocaFoto(img,listaEnc){
  img.dataset.lista=listaEnc; img.dataset.i="0";
  try{ img.src=JSON.parse(decodeURIComponent(listaEnc))[0]; }catch(e){}
}

function precoFmt(v){
  const s=(v||"").toString().trim();
  if(!s) return "";
  if(s.toUpperCase().indexOf("R$")===0) return s;
  const n=parseFloat(s.replace(/\./g,"").replace(",","."));
  if(isNaN(n)) return s;
  return "R$ " + n.toFixed(2).replace(".",",");
}

function cardHTML(p){
  const cores = p.cores;
  const first = cores[0];
  const dots = cores.map((c,i)=>
    `<span class="dot${i===0?" on":""}" data-lista="${c.lista}" data-cor="${c.cor}" style="background:${corHex(c.cor)}" title="${c.cor}"></span>`
  ).join("");
  const tag = p.tag ? `<span class="tag${p.oferta?" tag-oferta":""}">${p.tag}</span>` : (p.oferta?`<span class="tag tag-oferta">Oferta</span>`:"");
  const msg = encodeURIComponent("Olá! Tenho interesse no modelo "+p.nome+" da DBAESSE.");
  return `<div class="card" data-nome="${p.nome}">
    <a class="frame" href="https://wa.me/${WHATSAPP}?text=${msg}" target="_blank" rel="noopener">
      <img src="${first.fotos[0]}" data-lista="${first.lista}" data-i="0" onerror="proximaFoto(this)" alt="${p.nome}" loading="lazy">
      ${tag}
      <span class="buy">Comprar</span>
    </a>
    <div class="meta">
      <div class="name">${p.nome}</div>
      <div class="price">${p.preco}</div>
      ${cores.length>1?`<div class="swatches">${dots}</div>`:""}
      <div class="cor-nome">${cores.length>1?first.cor:""}</div>
    </div>
  </div>`;
}

function secaoHTML(id, eyebrow, titulo, desc, produtos, extraClass){
  const cards = produtos.length
      ? `<div class="grid">${produtos.map(cardHTML).join("")}</div>`
      : `<div class="vazio">Novidades em breve</div>`;
  const inner = `<div class="col-head">
      <div class="col-eyebrow">${eyebrow}</div>
      <div class="col-title">${titulo}</div>
      ${desc?`<div class="col-desc">${desc}</div>`:""}
      <div class="rule"></div>
    </div>
    ${cards}`;
  if(extraClass==="ofertas")
    return `<section class="collection ofertas" id="${id}"><div class="ofertas-in">${inner}</div></section>`;
  return `<section class="collection" id="${id}">${inner}</section>`;
}

async function baixar(src,nome){
  try{
    const r=await fetch(src); const b=await r.blob();
    const u=URL.createObjectURL(b);
    const a=document.createElement("a"); a.href=u; a.download=nome.replace(/\s+/g,"-")+EXTENSAO;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u);
  }catch(e){ window.open(src,"_blank"); }
}

function ativar(){
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}})},{threshold:.12});
  document.querySelectorAll(".card").forEach((c,i)=>{c.style.transitionDelay=(i%4*70)+"ms";io.observe(c);});
  document.querySelectorAll(".rule").forEach(r=>io.observe(r));

  document.querySelectorAll(".card").forEach(card=>{
    const img=card.querySelector(".frame img");
    const nome=card.dataset.nome||"produto";
    const corNome=card.querySelector(".cor-nome");
    card.querySelectorAll(".dot").forEach(d=>{
      d.addEventListener("click",e=>{
        e.preventDefault(); e.stopPropagation();
        img.style.opacity=0;
        setTimeout(()=>{img.onerror=function(){proximaFoto(this)};trocaFoto(img,d.dataset.lista);img.style.opacity=1;},140);
        card.querySelectorAll(".dot").forEach(x=>x.classList.remove("on"));
        d.classList.add("on");
        if(corNome) corNome.textContent=d.dataset.cor;
      });
    });
    const b=document.createElement("span");
    b.className="dl"; b.title="Baixar foto"; b.textContent="\u2193";
    b.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();baixar(img.currentSrc||img.src,nome+"-"+((corNome&&corNome.textContent)||""));});
    card.querySelector(".frame").appendChild(b);
  });
}

async function montar(){
  let txt;
  try{
    const r=await fetch(PLANILHA_CSV+"&t="+Date.now());
    txt=await r.text();
  }catch(e){
    $("#status").textContent="Não foi possível carregar o catálogo agora. Tente novamente em instantes.";
    return;
  }
  const rows=parseCSV(txt);
  if(rows.length<2){ $("#status").textContent="A planilha ainda não tem produtos."; return; }

  const head=rows[0].map(h=>slug(h));
  const idx={
    cat:  head.findIndex(h=>h.startsWith("categoria")),
    nome: head.findIndex(h=>h.startsWith("nome")),
    cor:  head.findIndex(h=>h.startsWith("cor")),
    preco:head.findIndex(h=>h.startsWith("preco")),
    tag:  head.findIndex(h=>h.startsWith("tag")),
    of:   head.findIndex(h=>h.startsWith("oferta")),
    ref:  head.findIndex(h=>h.startsWith("referencia")),
    link: head.findIndex(h=>h.startsWith("link"))
  };

  const mapa={};   // nome -> produto
  const ordem=[];
  let bannerRef="";

  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const cat=cap(r[idx.cat]), nome=cap(r[idx.nome]);
    const ref=(r[idx.ref]||"").trim();
    if(!ref) continue;

    // linha de configuração do banner
    if(slug(cat)==="banner" || slug(nome)==="banner"){ bannerRef=ref; continue; }
    if(!cat || !nome) continue;

    const chave=slug(cat)+"|"+slug(nome);
    if(!mapa[chave]){
      mapa[chave]={cat:cat,nome:nome,preco:precoFmt(r[idx.preco]),
                   tag:cap(r[idx.tag]),oferta:slug(r[idx.of])==="sim",cores:[]};
      ordem.push(chave);
    }
    const p=mapa[chave];
    if(!p.preco) p.preco=precoFmt(r[idx.preco]);
    if(!p.tag && cap(r[idx.tag])) p.tag=cap(r[idx.tag]);
    if(slug(r[idx.of])==="sim") p.oferta=true;
    const fotos=fotoUrls(r,idx);
    if(fotos.length) p.cores.push({cor:cap(r[idx.cor])||"Único",fotos:fotos,
                                   lista:encodeURIComponent(JSON.stringify(fotos))});
  }

  const produtos=ordem.map(k=>mapa[k]).filter(p=>p.cores.length);
  if(!produtos.length){ $("#status").textContent="A planilha ainda não tem produtos com foto."; return; }

  // banner pela planilha
  if(bannerRef){ $("#heroImg").src = REPO_FOTOS + bannerRef + EXTENSAO; }

  // monta seções
  let html="", menu="";
  const usadas=new Set();
  CATEGORIAS.forEach(([nomeCat,frase])=>{
    const lista=produtos.filter(p=>slug(p.cat)===slug(nomeCat));
    usadas.add(slug(nomeCat));
    const id=slug(nomeCat);
    menu+=`<a href="#${id}">${nomeCat}</a>`;
    html+=secaoHTML(id,"Linha",nomeCat,frase,lista);
  });
  // categorias que existem na planilha mas não estão na lista acima
  produtos.forEach(p=>{
    const s=slug(p.cat);
    if(usadas.has(s)) return;
    usadas.add(s);
    const lista=produtos.filter(x=>slug(x.cat)===s);
    menu+=`<a href="#${s}">${p.cat}</a>`;
    html+=secaoHTML(s,"Linha",p.cat,"",lista);
  });

  const ofertas=produtos.filter(p=>p.oferta);
  if(ofertas.length){
    menu+=`<a href="#ofertas">Ofertas</a>`;
    html+=secaoHTML("ofertas","Seleção · por tempo limitado","Ofertas",
      "Peças selecionadas com condição especial — enquanto durar o estoque.",ofertas,"ofertas");
  }

  $("#menu").innerHTML=menu;
  $("#conteudo").innerHTML=html;
  ativar();
}
